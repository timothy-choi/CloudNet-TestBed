name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run lint and unit tests
        run: make ci

      - name: Start mock API
        env:
          CLOUDNET_PROVIDER: mock
        run: |
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8010 &
          echo $! > ../uvicorn.pid

      - name: Wait for API
        env:
          CLOUDNET_API_BASE_URL: http://127.0.0.1:8010
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS "${CLOUDNET_API_BASE_URL}/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Run mock control-plane demo
        env:
          CLOUDNET_PROVIDER: mock
          CLOUDNET_API_BASE_URL: http://127.0.0.1:8010
        run: make demo-mock

      - name: Stop mock API
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" || true
          fi
