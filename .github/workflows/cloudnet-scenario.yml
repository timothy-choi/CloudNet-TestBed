name: CloudNet scenario

on:
  push:
  pull_request:

jobs:
  backend-failure-scenario:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Start API (mock provider)
        env:
          CLOUDNET_PROVIDER: mock
        run: |
          cd backend
          uvicorn app.main:app --host 127.0.0.1 --port 8010 &
          echo $! > ../uvicorn.pid

      - name: Wait for /health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8010/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in time" >&2
          exit 1

      - name: Run reliability scenario (CLI exit code gates CI)
        env:
          CLOUDNET_API_BASE_URL: http://127.0.0.1:8010
        run: bash scripts/cloudnet run examples/backend-failure.yaml

      - name: Stop API
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then
            kill "$(cat uvicorn.pid)" 2>/dev/null || true
            rm -f uvicorn.pid
          fi
