name: three-tier-demo
nodes:
  - name: frontend
    type: host
  - name: backend
    type: host
  - name: db
    type: host
links:
  - from: frontend
    to: backend
    subnet: 10.130.1.0/24
  - from: backend
    to: db
    subnet: 10.130.2.0/24
firewall_rules:
  - name: allow-frontend-backend-ping
    protocol: icmp
    from: frontend
    to: backend
  - name: allow-backend-db-ping
    protocol: icmp
    from: backend
    to: db
