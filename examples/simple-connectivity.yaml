# Minimal scenario: deploy two hosts on one link and verify ICMP connectivity.
# Start the mock API first:
#   CLOUDNET_PROVIDER=mock make dev
# Run:
#   export PATH="$PWD/scripts:$PATH"
#   cloudnet run examples/simple-connectivity.yaml

scenario:
  name: simple_connectivity_test

topology:
  name: simple-connectivity-demo
  nodes:
    - name: client-a
      type: host
    - name: client-b
      type: host
  links:
    - from: client-a
      to: client-b
      subnet: 10.200.1.0/24
  firewall_rules: []

steps:
  - deploy: true
  - validate: all
