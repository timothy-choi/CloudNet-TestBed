# Partially supported: a host appears on multiple links; deploy uses first subnet.
name: partial-multihomed-warning
nodes:
  - name: fe
    type: host
  - name: be
    type: host
  - name: db
    type: host
links:
  - from: fe
    to: be
    subnet: 10.60.1.0/24
  - from: fe
    to: db
    subnet: 10.60.2.0/24
firewall_rules: []
